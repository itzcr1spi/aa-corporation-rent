# Production stack for self-hosting (Ubuntu). See HANDOFF.md §5.
# Requires a .env file next to this one with: POSTGRES_PASSWORD, SITE_DOMAIN, SITE_URL
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: aa_rental
    # Exposed only to localhost so the host can run `npm run db:migrate` / `db:seed`.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aa -d aa_rental"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Inside the compose network the DB host is the service name `db`.
      DATABASE_URL: postgres://aa:${POSTGRES_PASSWORD}@db:5432/aa_rental
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?set SITE_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  db_data:
  caddy_data:
  caddy_config:
